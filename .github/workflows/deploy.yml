name: Deploy to Lolipop

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check PHP syntax
        run: find public_html -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Setup SSH and Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Write raw content to temp file
          printf "%s" "$SSH_PRIVATE_KEY" > raw_key
          
          # Check for headers
          if grep -q "BEGIN" raw_key; then
              echo "Headers detected. Using key as is (with formatting fix)."
              # Ensure unix newlines and trailing newline
              tr -d '\r' < raw_key > ~/.ssh/id_rsa
              if [ -n "$(tail -c 1 ~/.ssh/id_rsa)" ]; then
                  echo "" >> ~/.ssh/id_rsa
              fi
          else
              echo "No headers detected. Assuming raw key body."
              echo "Reconstructing key format..."
              
              # Strip all whitespace to get clean base64
              CLEAN_BODY=$(cat raw_key | tr -d ' \n\r')
              
              # Guess type based on content
              if [[ "$CLEAN_BODY" == b3BlbnNzaC* ]]; then
                  echo "Detected OpenSSH key format."
                  HEAD="-----BEGIN OPENSSH PRIVATE KEY-----"
                  TAIL="-----END OPENSSH PRIVATE KEY-----"
              else
                  echo "Defaulting to RSA key format."
                  HEAD="-----BEGIN RSA PRIVATE KEY-----"
                  TAIL="-----END RSA PRIVATE KEY-----"
              fi
              
              echo "$HEAD" > ~/.ssh/id_rsa
              echo "$CLEAN_BODY" | fold -w 64 >> ~/.ssh/id_rsa
              echo "$TAIL" >> ~/.ssh/id_rsa
          fi
          
          chmod 600 ~/.ssh/id_rsa
          
          # Validation (Warn but don't stop, let ssh-agent try)
          ssh-keygen -l -f ~/.ssh/id_rsa || echo "Warning: Key validation failed, but proceeding..."
          
          # Start Agent
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa
          
          # Host Key
          ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Deploy
          echo "=== STARTING DEPLOY ==="
          rsync -avz --delete \
            --exclude '.DS_Store' \
            --exclude 'debug_emails.log' \
            --exclude 'db/' \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa" \
            public_html/ $SSH_USER@$SSH_HOST:web/sanyu-roof.jp/
