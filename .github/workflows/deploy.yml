name: Deploy to Lolipop

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check PHP syntax
        run: find public_html -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Setup SSH and Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "=== SSH SETUP START ==="
          
          # 1. Write key exactly as provided first
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          
          # 2. Check if key is malformed (one-liner)
          LINES=$(wc -l < ~/.ssh/id_rsa)
          echo "Key file has $LINES lines."
          
          if [ "$LINES" -lt 2 ]; then
            echo "WARNING: Detected one-line key. Attempting to reconstruct format..."
            
            KEY_CONTENT=$(cat ~/.ssh/id_rsa)
            
            # Determine Header/Footer
            if echo "$KEY_CONTENT" | grep -q "OPENSSH PRIVATE KEY"; then
                HEAD="-----BEGIN OPENSSH PRIVATE KEY-----"
                TAIL="-----END OPENSSH PRIVATE KEY-----"
            elif echo "$KEY_CONTENT" | grep -q "RSA PRIVATE KEY"; then
                HEAD="-----BEGIN RSA PRIVATE KEY-----"
                TAIL="-----END RSA PRIVATE KEY-----"
            else
                # Fallback to RSA if unknown
                HEAD="-----BEGIN RSA PRIVATE KEY-----"
                TAIL="-----END RSA PRIVATE KEY-----"
            fi
            
            # Extract body: Remove header/footer and ALL spaces/newlines
            # Using sed to remove known headers, then tr to clean everything else
            BODY=$(echo "$KEY_CONTENT" | sed "s/$HEAD//" | sed "s/$TAIL//" | tr -d ' \n\r')
            
            # Reconstruct file
            echo "$HEAD" > ~/.ssh/id_rsa
            echo "$BODY" | fold -w 64 >> ~/.ssh/id_rsa
            echo "$TAIL" >> ~/.ssh/id_rsa
            
            echo "Reconstruction complete. New line count: $(wc -l < ~/.ssh/id_rsa)"
          else
            # Even if multi-line, ensure it ends with newline
            if [ -n "$(tail -c 1 ~/.ssh/id_rsa)" ]; then
                echo "" >> ~/.ssh/id_rsa
            fi
          fi
          
          chmod 600 ~/.ssh/id_rsa
          
          # 3. Start Agent and Add
          eval $(ssh-agent -s)
          
          echo "Adding key to agent..."
          ssh-add ~/.ssh/id_rsa
          
          # 4. Host Key
          ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # 5. Deploy
          echo "=== STARTING DEPLOY ==="
          
          rsync -avz --delete \
            --exclude '.DS_Store' \
            --exclude 'debug_emails.log' \
            --exclude 'db/' \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa" \
            public_html/ $SSH_USER@$SSH_HOST:web/sanyu-roof.jp/
