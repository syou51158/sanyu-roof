name: Deploy to Lolipop

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check PHP syntax
        run: find public_html -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Setup SSH and Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          
          # Write key to file using printf to preserve newlines strictly
          printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          
          # Remove carriage returns (Windows line endings) just in case
          tr -d '\r' < ~/.ssh/id_rsa > ~/.ssh/id_rsa.tmp && mv ~/.ssh/id_rsa.tmp ~/.ssh/id_rsa
          
          # Ensure strict permissions
          chmod 600 ~/.ssh/id_rsa
          
          # Ensure the key ends with a newline (OpenSSH requirement)
          # If the last byte is not a newline, append one
          if [ -n "$(tail -c 1 ~/.ssh/id_rsa)" ]; then
              echo "" >> ~/.ssh/id_rsa
          fi
          
          # Debug: Check key format (safe, don't reveal full key)
          echo "Key file info:"
          ls -l ~/.ssh/id_rsa
          echo "Line count:"
          wc -l < ~/.ssh/id_rsa
          echo "First line:"
          head -n 1 ~/.ssh/id_rsa
          echo "Last line:"
          tail -n 1 ~/.ssh/id_rsa
          
          # Register host key
          ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts
          
          # Deploy using rsync directly
          # Added -o PubkeyAcceptedKeyTypes=+ssh-rsa to support older servers like Lolipop
          # Added -o HostKeyAlgorithms=+ssh-rsa just in case
          rsync -avz --delete \
            --exclude '.DS_Store' \
            --exclude 'debug_emails.log' \
            --exclude 'db/' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa" \
            public_html/ $SSH_USER@$SSH_HOST:web/sanyu-roof.jp/
