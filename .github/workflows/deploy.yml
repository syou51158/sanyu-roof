name: Deploy to Lolipop

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check PHP syntax
        run: find public_html -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Setup SSH and Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "=== SSH SETUP DEBUG ==="
          
          # Check if secrets are present (without revealing them)
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is empty!"
            exit 1
          fi
          if [ -z "$SSH_HOST" ]; then
            echo "ERROR: SSH_HOST secret is empty!"
            exit 1
          fi
          
          # Use printf to handle newlines correctly
          printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Fix potential newline issues
          # Remove CR (Windows) and ensure trailing newline
          tr -d '\r' < ~/.ssh/id_rsa > ~/.ssh/id_rsa.tmp && mv ~/.ssh/id_rsa.tmp ~/.ssh/id_rsa
          if [ -n "$(tail -c 1 ~/.ssh/id_rsa)" ]; then
              echo "" >> ~/.ssh/id_rsa
          fi

          echo "Key file stats:"
          ls -l ~/.ssh/id_rsa
          
          # CRITICAL: Validate Key Format
          echo "Validating key format..."
          if ! ssh-keygen -l -f ~/.ssh/id_rsa; then
             echo "FATAL ERROR: The SSH key file is invalid or corrupted."
             echo "This usually means the secret in GitHub is malformed."
             echo "First line of key file:"
             head -n 1 ~/.ssh/id_rsa
             exit 1
          else
             echo "Key format is VALID."
             ssh-keygen -l -f ~/.ssh/id_rsa
          fi
          
          # Start SSH Agent
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa
          
          # Host Key Scan (with fallback)
          echo "Scanning host key..."
          ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null || echo "Keyscan failed, relying on strict checking=no"
          
          echo "=== START CONNECTION TEST ==="
          # Try connecting
          ssh -vvv -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa $SSH_USER@$SSH_HOST "echo 'SSH SUCCESS: Logged in as' \$(whoami)"
          
          echo "=== START RSYNC DEPLOY ==="
          # Rsync using the agent (no -i flag needed if agent works, but we keep explicit options for safety)
          # Note: We use -e 'ssh ...' to force options, but we can rely on agent for auth
          
          rsync -avz --delete \
            --exclude '.DS_Store' \
            --exclude 'debug_emails.log' \
            --exclude 'db/' \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa" \
            public_html/ $SSH_USER@$SSH_HOST:web/sanyu-roof.jp/
